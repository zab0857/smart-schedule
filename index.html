<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧課表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #080d18;
  --card:   #111827;
  --card2:  #161f30;
  --border: #1e2d45;
  --accent: #38bdf8;
  --gold:   #fbbf24;
  --green:  #10b981;
  --red:    #f43f5e;
  --orange: #fb923c;
  --teal:   #2dd4bf;
  --text:   #ffffff;
  --text2:  #a0c4df;
  --text3:  #3d5470;
  /* 成員專屬顏色 */
  --mh: #00F2FE;   /* 旻桓 亮藍綠 */
  --gy: #FFD700;   /* 冠宇 鮮黃   */
  --jy: #FF85AD;   /* 婕檥 粉紫   */
  --r: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans TC',sans-serif;min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(56,189,248,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,189,248,.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;
}
.wrap{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:18px 16px 28px;}

.w-loading{color:var(--text2);font-size:15px;display:flex;align-items:center;gap:4px;}
.dots::after{
  content:'';
  animation:dotdot 1.4s infinite;
}
@keyframes dotdot{
  0%{content:'';}
  25%{content:'.';}
  50%{content:'..';}
  75%{content:'...';}
  100%{content:'';}
}

/* TOP ROW */
.top-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}

.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:20px 22px;
  position:relative;overflow:hidden;
}
.card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.35;
}

/* CLOCK */
.clock-card{text-align:center;}
.clock-time{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(50px,7vw,76px);
  color:var(--accent);text-shadow:0 0 28px rgba(56,189,248,.3);
  letter-spacing:3px;line-height:1;
}
.clock-date{font-size:16px;color:var(--text2);margin-top:8px;letter-spacing:2px;}
.clock-wd{font-size:26px;font-weight:700;color:var(--gold);margin-top:5px;}

/* WEATHER */
.weather-card{display:flex;flex-direction:column;justify-content:center;}
.card-label{font-size:10px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:12px;}
.w-main{display:flex;align-items:center;gap:14px;}
.w-icon{font-size:52px;line-height:1;}
.w-temp{font-family:'Share Tech Mono',monospace;font-size:54px;line-height:1;color:#fff;}
.w-temp sup{font-size:22px;color:var(--text2);}
.w-desc{font-size:17px;color:var(--text2);margin-top:4px;}
.w-sub{font-size:12px;color:var(--text3);margin-top:3px;}

/* HOLIDAY */
.h-banner{
  display:none;align-items:center;gap:14px;
  background:linear-gradient(135deg,rgba(251,146,60,.12),rgba(244,63,94,.08));
  border:1px solid rgba(251,146,60,.45);
  border-radius:var(--r);padding:14px 20px;margin-bottom:14px;
  animation:hpulse 2.2s ease-in-out infinite;
}
.h-banner.show{display:flex;}
@keyframes hpulse{
  0%,100%{border-color:rgba(251,146,60,.45);}
  50%{border-color:rgba(251,146,60,.9);box-shadow:0 0 20px rgba(251,146,60,.18);}
}
.h-ico{font-size:30px;}
.h-name{font-size:17px;font-weight:700;color:var(--orange);}
.h-warn{font-size:13px;color:var(--text2);margin-top:3px;}

/* NEXT CLASS */
.next-card{
  margin-bottom:14px;
  background:linear-gradient(135deg,rgba(16,185,129,.09),rgba(56,189,248,.05));
  border-color:rgba(16,185,129,.35);
}
.next-card::after{background:linear-gradient(90deg,transparent,var(--green),transparent);}
.next-inner{display:flex;align-items:center;gap:16px;}
.next-dot{
  width:13px;height:13px;border-radius:50%;
  background:var(--green);flex-shrink:0;
  animation:sonar 1.8s ease-out infinite;
}
@keyframes sonar{
  0%{box-shadow:0 0 0 0 rgba(16,185,129,.7);}
  70%{box-shadow:0 0 0 14px rgba(16,185,129,0);}
  100%{box-shadow:0 0 0 0 rgba(16,185,129,0);}
}
.next-body{flex:1;}
.next-lbl{font-size:10px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:5px;}
.next-who{font-size:20px;font-weight:700;}
.next-who span{color:var(--teal);}
.next-cd{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--green);margin-top:4px;}
.next-badge{
  background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);
  border-radius:10px;padding:8px 14px;
  font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--green);white-space:nowrap;
}

/* SCHEDULE */
.sec-title{
  font-size:10px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;
  margin-bottom:14px;display:flex;align-items:center;gap:10px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

.no-cls{text-align:center;padding:28px 0;color:var(--text3);font-size:15px;letter-spacing:2px;}
.no-cls em{display:block;font-size:34px;margin-bottom:8px;font-style:normal;}

.clist{display:flex;flex-direction:column;gap:10px;}
.ci{
  background:var(--card2);border:1px solid var(--border);
  border-radius:11px;padding:14px 18px;
  display:grid;grid-template-columns:120px 1fr auto;
  align-items:center;gap:14px;
  position:relative;overflow:hidden;transition:all .3s;
}
.ci.active{
  border-color:rgba(244,63,94,.6);
  background:rgba(244,63,94,.07);
  box-shadow:0 0 24px rgba(244,63,94,.25);
}
.ci.done{opacity:.38;}
.ci.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--red);animation:breathe 1.6s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:1;box-shadow:0 0 8px var(--red);}50%{opacity:.2;box-shadow:none;}}

.ci-time{font-family:'Share Tech Mono',monospace;font-size:15px;color:#ffffff;white-space:nowrap;font-weight:600;}
.ci-name{font-size:22px;font-weight:900;}
.ci-subj{font-size:14px;color:#ffffff;margin-top:3px;font-weight:500;}
.ci-badge{font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;white-space:nowrap;letter-spacing:.5px;}
/* 成員名稱顏色 */
.name-mh{color:var(--mh);text-shadow:0 0 12px rgba(0,242,254,.5);}
.name-gy{color:var(--gy);text-shadow:0 0 12px rgba(255,215,0,.4);}
.name-jy{color:var(--jy);text-shadow:0 0 12px rgba(255,133,173,.4);}
.b-up{background:rgba(126,168,201,.1);color:var(--text2);}
.b-on{background:rgba(244,63,94,.2);color:var(--red);animation:blink 1.6s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.b-dn{background:rgba(16,185,129,.1);color:var(--green);}

/* STOCK BAR */
.stock-card{margin-bottom:14px;padding:16px 20px;}
.stock-row{display:flex;gap:10px;flex-wrap:wrap;}
.stock-item{
  background:var(--card2);border:1px solid var(--border);
  border-radius:10px;padding:11px 14px;text-align:center;
  flex:1;min-width:100px;
}
.stock-sym{font-size:11px;letter-spacing:1px;color:var(--text3);margin-bottom:3px;}
.stock-name{font-size:11px;color:var(--text2);margin-bottom:5px;}
.stock-price{font-family:'Share Tech Mono',monospace;font-size:19px;font-weight:700;color:#fff;}
.stock-chg{font-size:12px;margin-top:3px;font-weight:700;}
.up{color:#f43f5e;}   /* 台灣：漲=紅 */
.dn{color:#26c97a;}   /* 台灣：跌=綠 */
.flat{color:var(--text3);}
.stock-tag{font-size:9px;color:var(--text3);margin-top:2px;}

/* INDICATORS ROW */
.indicator-row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
.ind-card{
  background:var(--card2);border:1px solid var(--border);
  border-radius:10px;padding:11px 16px;
  flex:1;min-width:140px;
  display:flex;align-items:center;gap:12px;
}
.ind-light{width:22px;height:22px;border-radius:50%;flex-shrink:0;box-shadow:0 0 10px currentColor;}
.ind-body{}
.ind-title{font-size:10px;color:var(--text3);letter-spacing:1px;margin-bottom:3px;}
.ind-val{font-size:16px;font-weight:700;color:#fff;}
.ind-sub{font-size:11px;color:var(--text2);margin-top:2px;}

.stock-loading{color:var(--text3);font-size:13px;text-align:center;padding:8px 0;}
@media(max-width:600px){
  .stock-row{display:grid;grid-template-columns:1fr 1fr;}
  .indicator-row{flex-direction:column;}
}

/* FOOTER */
footer{
  text-align:center;margin-top:14px;font-size:11px;
  letter-spacing:2px;color:var(--text3);
  border-top:1px solid var(--border);padding-top:14px;
}
footer span{color:var(--accent);}

@media(max-width:600px){
  .top-row{grid-template-columns:1fr;}
  .ci{grid-template-columns:1fr;gap:8px;}
  .ci-badge{width:fit-content;}
  .next-badge{display:none;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="top-row">
    <div class="card clock-card">
      <div class="clock-time" id="clock">--:--:--</div>
      <div class="clock-date" id="cdate"></div>
      <div class="clock-wd"   id="cwd"></div>
    </div>
    <div class="card weather-card">
      <div class="card-label">水林鄉即時天氣</div>
      <div id="weather-wrap"><div class="w-loading">🛰️ 水林天氣載入中<span class="dots"></span></div></div>
    </div>
  </div>

  <div class="h-banner" id="hbanner">
    <div class="h-ico">🎉</div>
    <div>
      <div class="h-name" id="hname"></div>
      <div class="h-warn">🏖️ 連假愉快！請確認補習班是否停課</div>
    </div>
  </div>

  <div class="card stock-card">
    <div class="card-label">台股即時報價</div>
    <div id="stock-wrap">
      <div class="stock-loading">📈 股價載入中<span class="dots"></span></div>
    </div>
  </div>

  <div class="card next-card">
    <div class="card-label">下一堂課程預告</div>
    <div class="next-inner" id="next-inner"><div style="color:var(--text3)">計算中…</div></div>
  </div>

  <div class="card">
    <div class="sec-title">今日課表</div>
    <div id="sched"><div class="no-cls"><em>📅</em>載入中…</div></div>
  </div>

  <footer>自動更新中 ｜ 距下次刷新：<span id="rcd">60</span> 秒</footer>
</div>

<script>
/* ─── helpers ─── */
const pad=n=>String(n).padStart(2,'0');
const hm=(h,m)=>h*60+m;
const WD=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
const dsStr=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

/* ─── CLOCK ─── */
function tickClock(){
  const n=new Date();
  document.getElementById('clock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  document.getElementById('cdate').textContent=`民國 ${n.getFullYear()-1911} 年 ${n.getMonth()+1} 月 ${n.getDate()} 日`;
  document.getElementById('cwd').textContent=WD[n.getDay()];
}
setInterval(tickClock,1000); tickClock();

/* ─── WEATHER (水林鄉固定座標) ─── */
const WMO={
  0:['☀️','晴天'],1:['🌤️','大致晴朗'],2:['⛅','部分多雲'],3:['☁️','陰天'],
  45:['🌫️','有霧'],48:['🌫️','凍霧'],
  51:['🌦️','輕毛毛雨'],53:['🌦️','毛毛雨'],55:['🌧️','大毛毛雨'],
  61:['🌧️','小雨'],63:['🌧️','中雨'],65:['🌧️','大雨'],
  71:['🌨️','小雪'],73:['🌨️','中雪'],75:['❄️','大雪'],
  80:['🌦️','陣雨'],81:['🌧️','中陣雨'],82:['⛈️','強陣雨'],
  95:['⛈️','雷雨'],96:['⛈️','冰雹雷雨'],99:['⛈️','強冰雹雷雨'],
};
function wmoGet(c){
  if(WMO[c]) return WMO[c];
  let b=null,bd=999;
  for(const k of Object.keys(WMO)){const d=Math.abs(+k-c);if(d<bd){bd=d;b=WMO[k];}}
  return b||['🌡️','未知'];
}
async function loadWeather(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=23.57&longitude=120.24&current=temperature_2m,weathercode,relative_humidity_2m&timezone=Asia%2FTaipei');
    const d=await r.json();
    const temp=Math.round(d.current.temperature_2m);
    const hum=d.current.relative_humidity_2m;
    const [ico,desc]=wmoGet(d.current.weathercode);
    document.getElementById('weather-wrap').innerHTML=`
      <div class="w-main">
        <div class="w-icon">${ico}</div>
        <div>
          <div class="w-temp">${temp}<sup>°C</sup></div>
          <div class="w-desc">${desc}</div>
          <div class="w-sub">相對濕度 ${hum}%</div>
        </div>
      </div>`;
  }catch{
    document.getElementById('weather-wrap').innerHTML=
      `<div style="color:var(--text3);font-size:14px;">🛰️ 水林天氣更新中...</div>`;
  }
}
loadWeather();
setInterval(loadWeather,10*60*1000);

/* ─── 2026 HOLIDAYS ─── */
const H2026=[
  {n:'元旦',              r:['2026-01-01','2026-01-01']},
  {n:'農曆春節連假',      r:['2026-02-14','2026-02-22']},
  {n:'和平紀念日',        r:['2026-03-02','2026-03-02']},
  {n:'清明節連假',        r:['2026-04-03','2026-04-06']},
  {n:'勞動節',            r:['2026-05-01','2026-05-01']},
  {n:'端午節連假',        r:['2026-06-19','2026-06-21']},
  {n:'中秋節／教師節連假',r:['2026-09-25','2026-09-28']},
  {n:'國慶日連假',        r:['2026-10-09','2026-10-11']},
];
function todayHoliday(){const t=dsStr(new Date());for(const h of H2026){if(t>=h.r[0]&&t<=h.r[1])return h;}return null;}
function updateHoliday(){
  const h=todayHoliday();
  const el=document.getElementById('hbanner');
  if(h){document.getElementById('hname').textContent=`🎌 ${h.n}`;el.classList.add('show');}
  else el.classList.remove('show');
}

/* ─── SCHEDULE ─── */
function fridaySpeaking(){
  const now=new Date();
  const t=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const d3=new Date(2026,5,12); // 2026-06-12
  if(t>=d3) return {label:'19:30–19:55',sh:19,sm:30,eh:19,em:55};
  return           {label:'19:00–19:25',sh:19,sm:0, eh:19,em:25};
}
function getDay(dow){
  switch(dow){
    case 1:return[
      {label:'16:30–18:00',sh:16,sm:30,eh:18,em:0, name:'旻桓',subj:'英文'},
      {label:'18:30–20:00',sh:18,sm:30,eh:20,em:0, name:'冠宇',subj:'英文'},
    ];
    case 2:return[
      {label:'16:30–18:30',sh:16,sm:30,eh:18,em:30,name:'旻桓',subj:'數學'},
      {label:'19:00–20:00',sh:19,sm:0, eh:20,em:0, name:'冠宇',subj:'鋼琴'},
    ];
    case 3:return[
      {label:'13:30–15:30',sh:13,sm:30,eh:15,em:30,name:'冠宇',subj:'數學'},
      {label:'16:30–18:00',sh:16,sm:30,eh:18,em:0, name:'旻桓',subj:'英文'},
      {label:'18:30–20:00',sh:18,sm:30,eh:20,em:0, name:'冠宇',subj:'英文'},
    ];
    case 4:{
      const t=new Date(); const today=new Date(t.getFullYear(),t.getMonth(),t.getDate());
      const d1=new Date(2026,4,21), d2=new Date(2026,5,25); // 5/21 ~ 6/25
      if(today>=d1&&today<=d2){
        return[{label:'18:00–18:25',sh:18,sm:0,eh:18,em:25,name:'旻桓',subj:'口說英語（25分鐘）'}];
      }
      return[];
    }
    case 5:{
      const sp=fridaySpeaking();
      return[
        {label:'16:30–18:30',sh:16,sm:30,eh:18,em:30,name:'旻桓',subj:'數學'},
        {label:'17:30–18:30',sh:17,sm:30,eh:18,em:30,name:'婕檥',subj:'瑜伽'},
        {label:sp.label,sh:sp.sh,sm:sp.sm,eh:sp.eh,em:sp.em,name:'冠宇',subj:'口說英文（25分鐘）'},
      ];
    }
    case 6:return[
      {label:'10:00–12:00',sh:10,sm:0,eh:12,em:0,name:'冠宇',subj:'數學'},
    ];
    default:return[];
  }
}
function status(c){
  const n=new Date(),cur=hm(n.getHours(),n.getMinutes());
  const s=hm(c.sh,c.sm),e=hm(c.eh,c.em);
  if(cur<s) return 'upcoming';
  if(cur<=e)return 'active';
  return 'done';
}
const BADGE={upcoming:['b-up','尚未開始'],active:['b-on','🔴 上課中'],done:['b-dn','已結束']};

/* 成員名稱 → CSS class */
function nameClass(n){
  if(n==='旻桓') return 'name-mh';
  if(n==='冠宇') return 'name-gy';
  if(n==='婕檥') return 'name-jy';
  return '';
}

function renderSched(){
  const dow=new Date().getDay(), list=getDay(dow);
  const el=document.getElementById('sched');
  if(!list.length){
    el.innerHTML=`<div class="no-cls"><em>🏠</em>${WD[dow]}　今日無補習課程，好好休息！</div>`;
    return;
  }
  let h='<div class="clist">';
  for(const c of list){
    const st=status(c),[cls,lbl]=BADGE[st];
    const nc=nameClass(c.name);
    h+=`<div class="ci ${st}">
      <div class="ci-time">${c.label}</div>
      <div><div class="ci-name ${nc}">${c.name}</div><div class="ci-subj">${c.subj}</div></div>
      <div class="ci-badge ${cls}">${lbl}</div>
    </div>`;
  }
  el.innerHTML=h+'</div>';
}

/* ─── NEXT CLASS ─── */
function fmtCD(mins){
  if(mins<=0)return'即將開始';
  const h=Math.floor(mins/60),m=mins%60;
  return h>0?`還有 ${h} 小時 ${m} 分鐘`:`還有 ${m} 分鐘`;
}
function findNext(){
  const now=new Date(), cur=hm(now.getHours(),now.getMinutes());
  for(let off=0;off<7;off++){
    const d=new Date(now); d.setDate(now.getDate()+off);
    const dow=d.getDay(), list=getDay(dow);
    for(const c of list){
      const s=hm(c.sh,c.sm);
      if(off===0&&s<=cur) continue;
      const diff=off===0?(s-cur):(24*60-cur+(off-1)*24*60+s);
      return{c,diff,off,dow};
    }
  }
  return null;
}
function renderNext(){
  const r=findNext(), el=document.getElementById('next-inner');
  if(!r){el.innerHTML=`<div style="color:var(--text3)">近期無課程</div>`;return;}
  const {c,diff,off,dow}=r;
  const when=off===0?'今天':off===1?'明天':WD[dow];
  const nc=nameClass(c.name);
  el.innerHTML=`
    <div class="next-dot"></div>
    <div class="next-body">
      <div class="next-lbl">下一堂課程預告</div>
      <div class="next-who"><span class="${nc}">${c.name}</span> <span style="color:#fff;font-weight:500">${c.subj}</span></div>
      <div class="next-cd">${when} ${c.label} ── ${fmtCD(diff)}</div>
    </div>
    <div class="next-badge">${fmtCD(diff)}</div>`;
}

/* ─── STOCK + INDICATORS ─── */

// 台灣習慣：漲=紅(up) 跌=綠(dn)
function chgClass(v){ return v>0?'up':v<0?'dn':'flat'; }
function chgArrow(v){ return v>0?'▲':v<0?'▼':'—'; }

function stockItemHtml(sym,name,price,chgVal,chgPct,tag){
  if(!price||isNaN(price)) return `
    <div class="stock-item">
      <div class="stock-sym">${sym}</div>
      <div class="stock-name">${name}</div>
      <div class="stock-price">--</div>
      <div class="stock-chg flat">更新中</div>
    </div>`;
  const cls=chgClass(chgVal);
  const isIdx=(sym==='加權指數');
  const priceStr=isIdx
    ? Math.round(price).toLocaleString()
    : price.toFixed(2);
  const pctStr=isNaN(chgPct)?'--':(Math.abs(chgPct).toFixed(2)+'%');
  return `
    <div class="stock-item">
      <div class="stock-sym">${sym}</div>
      <div class="stock-name">${name}</div>
      <div class="stock-price">${priceStr}</div>
      <div class="stock-chg ${cls}">${chgArrow(chgVal)} ${pctStr}</div>
      <div class="stock-tag">${tag}</div>
    </div>`;
}

// Yahoo Finance proxy — 5秒超時，失敗自動重試一次
async function fetchWithTimeout(url, ms=5000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(), ms);
  try{
    const r=await fetch(url,{signal:ctrl.signal});
    clearTimeout(timer);
    return r;
  }catch(e){
    clearTimeout(timer);
    throw e;
  }
}

async function fetchYahoo(ticker, retry=1){
  try{
    const url=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=2d`;
    const proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const r=await fetchWithTimeout(proxy, 5000);
    const outer=await r.json();
    const d=JSON.parse(outer.contents);
    const meta=d.chart.result[0].meta;
    const price=meta.regularMarketPrice||0;
    const ref=meta.chartPreviousClose||meta.previousClose||0;
    return{price,ref,chgVal:price-ref,chgPct:ref>0?(price-ref)/ref*100:0};
  }catch(e){
    if(retry>0){
      await new Promise(res=>setTimeout(res,1500)); // 等1.5秒再重試
      return fetchYahoo(ticker, retry-1);
    }
    return null;
  }
}

// TWSE 收盤（個股）
async function fetchTWSEClose(sym){
  try{
    const today=new Date();
    const ymd=`${today.getFullYear()}${pad(today.getMonth()+1)}${pad(today.getDate())}`;
    const r=await fetch(`https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${ymd}&stockNo=${sym}`);
    const d=await r.json();
    if(!d.data||d.data.length===0) return null;
    const last=d.data[d.data.length-1];
    // last[6]=收盤, last[7]=漲跌符號, last[8]=漲跌價差
    const price=parseFloat(last[6].replace(/,/g,''));
    const sign=last[7].includes('-')?-1:1;
    const chgAmt=parseFloat(last[8].replace(/,/g,''))*sign;
    const ref=price-chgAmt;
    return{price,ref,chgVal:chgAmt,chgPct:ref>0?chgAmt/ref*100:0};
  }catch{return null;}
}

// VIX 恐慌指數 via Yahoo
async function fetchVIX(){
  try{
    const q=await fetchYahoo('%5EVIX');
    return q;
  }catch{return null;}
}

function vixLevel(v){
  if(v<15) return{label:'極度樂觀',color:'#10b981'};
  if(v<20) return{label:'市場平靜',color:'#38bdf8'};
  if(v<25) return{label:'輕微恐慌',color:'#fbbf24'};
  if(v<30) return{label:'明顯恐慌',color:'#fb923c'};
  return       {label:'極度恐慌',color:'#f43f5e'};
}

async function loadStocks(isRetry=false){
  const isOpen=isMarketOpen();
  const tag=isOpen?'即時':'收盤';
  document.querySelector('.stock-card .card-label').textContent=
    isOpen?'台股即時報價':'台股收盤價格';

  const tickers=[
    {sym:'加權指數', name:'台灣加權',  yahoo:'^TWII'},
    {sym:'0050',    name:'元大台灣50', yahoo:'0050.TW'},
    {sym:'00631L',  name:'台灣50正2',  yahoo:'00631L.TW'},
    {sym:'2330',    name:'台積電',     yahoo:'2330.TW'},
    {sym:'2367',    name:'燿華',       yahoo:'2367.TW'},
  ];

  // 顯示重試動畫（只有重試時才換文字，避免閃爍）
  if(isRetry){
    document.getElementById('stock-wrap').innerHTML=
      `<div class="stock-loading">📡 股價重新連線中<span class="dots"></span></div>`;
  }

  const results=await Promise.all(tickers.map(t=>fetchYahoo(t.yahoo)));

  // 檢查是否全部失敗（results 都是 null）
  const allFailed=results.every(r=>r===null);
  if(allFailed){
    document.getElementById('stock-wrap').innerHTML=
      `<div class="stock-loading">⏳ 股價連線中，5秒後重試<span class="dots"></span></div>`;
    setTimeout(()=>loadStocks(true), 5000); // 5秒後重試，直到成功
    return;
  }

  let stockHtml='<div class="stock-row">';
  for(let i=0;i<tickers.length;i++){
    const t=tickers[i], q=results[i];
    if(!q){ stockHtml+=stockItemHtml(t.sym,t.name,0,0,0,tag); continue; }
    stockHtml+=stockItemHtml(t.sym,t.name,q.price,q.chgVal,q.chgPct,tag);
  }
  stockHtml+='</div>';

  // 景氣燈號 + VIX
  const biz=getBusinessSignal();
  const vixData=await fetchVIX();
  const vixVal=vixData?vixData.price:null;
  const vixInfo=vixVal?vixLevel(vixVal):{label:'更新中',color:'var(--text3)'};

  const indHtml=`<div class="indicator-row">
    <div class="ind-card">
      <div class="ind-light" style="background:${biz.color};color:${biz.color};"></div>
      <div class="ind-body">
        <div class="ind-title">景氣信號燈　${biz.date}</div>
        <div class="ind-val" style="color:${biz.color}">${biz.signal}</div>
        <div class="ind-sub">${biz.desc}</div>
      </div>
    </div>
    <div class="ind-card">
      <div class="ind-light" style="background:${vixInfo.color};color:${vixInfo.color};"></div>
      <div class="ind-body">
        <div class="ind-title">VIX 恐慌指數</div>
        <div class="ind-val">${vixVal?vixVal.toFixed(2):'--'}</div>
        <div class="ind-sub" style="color:${vixInfo.color}">${vixInfo.label}</div>
      </div>
    </div>
  </div>`;

  document.getElementById('stock-wrap').innerHTML=stockHtml+indHtml;
}

function isMarketOpen(){
  const n=new Date();
  if(n.getDay()===0||n.getDay()===6) return false;
  const t=n.getHours()*100+n.getMinutes();
  return t>=900&&t<=1330;
}

loadStocks();
setInterval(loadStocks,3*60*1000);
