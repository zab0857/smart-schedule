<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧課表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080d18; --card:#111827; --card2:#161f30; --border:#1e2d45;
  --accent:#38bdf8; --gold:#fbbf24; --green:#10b981; --red:#f43f5e;
  --orange:#fb923c; --teal:#2dd4bf;
  --text:#ffffff; --text2:#a0c4df; --text3:#3d5470;
  --mh:#00F2FE; --gy:#FFD700; --jy:#FF85AD;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(56,189,248,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.025) 1px,transparent 1px);
  background-size:48px 48px;
}
.wrap{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:18px 16px 28px;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden;margin-bottom:14px;}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.35;}
.card-label{font-size:10px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:12px;}

/* ── TOP ROW ── */
.top-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}

/* ── CLOCK ── */
.clock-card{text-align:center;margin-bottom:0;}
.clock-time{font-family:'Share Tech Mono',monospace;font-size:clamp(50px,7vw,76px);color:var(--accent);text-shadow:0 0 28px rgba(56,189,248,.3);letter-spacing:3px;line-height:1;}
.clock-date{font-size:15px;color:var(--text2);margin-top:8px;letter-spacing:2px;}
.clock-wd{font-size:24px;font-weight:700;color:var(--gold);margin-top:5px;}

/* ── WEATHER ── */
.weather-card{display:flex;flex-direction:column;justify-content:center;margin-bottom:0;}
.w-main{display:flex;align-items:center;gap:14px;}
.w-icon{font-size:52px;line-height:1;}
.w-temp{font-family:'Share Tech Mono',monospace;font-size:50px;line-height:1;color:#fff;}
.w-temp sup{font-size:20px;color:var(--text2);}
.w-desc{font-size:15px;color:var(--text2);margin-top:4px;}
.w-sub{font-size:11px;color:var(--text3);margin-top:3px;}

/* ── HOLIDAY ── */
.h-banner{display:none;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(251,146,60,.12),rgba(244,63,94,.08));border:1px solid rgba(251,146,60,.45);border-radius:var(--r);padding:14px 20px;margin-bottom:14px;animation:hpulse 2.2s ease-in-out infinite;}
.h-banner.show{display:flex;}
@keyframes hpulse{0%,100%{border-color:rgba(251,146,60,.45);}50%{border-color:rgba(251,146,60,.9);box-shadow:0 0 20px rgba(251,146,60,.18);}}
.h-ico{font-size:30px;}
.h-name{font-size:17px;font-weight:700;color:var(--orange);}
.h-warn{font-size:13px;color:var(--text2);margin-top:3px;}

/* ── STOCK ── */
.stock-row{display:flex;gap:10px;flex-wrap:wrap;}
.stock-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;text-align:center;flex:1;min-width:100px;}
.stock-sym{font-size:11px;letter-spacing:1px;color:var(--text3);margin-bottom:3px;}
.stock-name{font-size:11px;color:var(--text2);margin-bottom:5px;}
.stock-price{font-family:'Share Tech Mono',monospace;font-size:19px;font-weight:700;color:#fff;}
.stock-chg{font-size:12px;margin-top:3px;font-weight:700;}
.up{color:#f43f5e;} .dn{color:#10b981;} .flat{color:var(--text3);}
.stock-tag{font-size:9px;color:var(--text3);margin-top:2px;}

/* ── INDICATORS ── */
.indicator-row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
.ind-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 16px;flex:1;min-width:140px;display:flex;align-items:center;gap:12px;}
.ind-light{width:22px;height:22px;border-radius:50%;flex-shrink:0;}
.ind-title{font-size:10px;color:var(--text3);letter-spacing:1px;margin-bottom:3px;}
.ind-val{font-size:16px;font-weight:700;color:#fff;}
.ind-sub{font-size:11px;color:var(--text2);margin-top:2px;}

/* ── THREE INSTITUTIONS ── */
.fi-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.fi-tab{font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:transparent;transition:all .2s;}
.fi-tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.fi-table{width:100%;border-collapse:collapse;}
.fi-table th{font-size:10px;letter-spacing:2px;color:var(--text3);padding:6px 10px;text-align:right;border-bottom:1px solid var(--border);}
.fi-table th:first-child{text-align:left;}
.fi-table td{font-size:14px;padding:9px 10px;border-bottom:1px solid rgba(30,45,69,.6);text-align:right;}
.fi-table td:first-child{text-align:left;color:#fff;font-weight:600;}
.fi-table tr:last-child td{border-bottom:none;}
.fi-rank{display:inline-block;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;text-align:center;line-height:20px;margin-right:6px;background:var(--border);color:var(--text3);}
.fi-rank.r1{background:#fbbf24;color:#000;} .fi-rank.r2{background:#9ca3af;color:#000;} .fi-rank.r3{background:#b45309;color:#fff;}
.fi-buy{color:#f43f5e;font-weight:700;} .fi-sell{color:#10b981;font-weight:700;}
.fi-date{font-size:10px;color:var(--text3);margin-left:8px;}

/* ── NEXT CLASS ── */
.next-card{background:linear-gradient(135deg,rgba(16,185,129,.09),rgba(56,189,248,.05));border-color:rgba(16,185,129,.35);}
.next-card::after{background:linear-gradient(90deg,transparent,var(--green),transparent);}
.next-inner{display:flex;align-items:center;gap:16px;}
.next-dot{width:13px;height:13px;border-radius:50%;background:var(--green);flex-shrink:0;animation:sonar 1.8s ease-out infinite;}
@keyframes sonar{0%{box-shadow:0 0 0 0 rgba(16,185,129,.7);}70%{box-shadow:0 0 0 14px rgba(16,185,129,0);}100%{box-shadow:0 0 0 0 rgba(16,185,129,0);}}}
.next-body{flex:1;}
.next-lbl{font-size:10px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:5px;}
.next-who{font-size:20px;font-weight:700;}
.next-cd{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--green);margin-top:4px;}
.next-badge{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);border-radius:10px;padding:8px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--green);white-space:nowrap;}

/* ── SCHEDULE ── */
.sec-title{font-size:10px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.no-cls{text-align:center;padding:28px 0;color:var(--text3);font-size:15px;letter-spacing:2px;}
.no-cls em{display:block;font-size:34px;margin-bottom:8px;font-style:normal;}
.clist{display:flex;flex-direction:column;gap:10px;}
.ci{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:14px 18px;display:grid;grid-template-columns:120px 1fr auto;align-items:center;gap:14px;position:relative;overflow:hidden;transition:all .3s;}
.ci.active{border-color:rgba(244,63,94,.6);background:rgba(244,63,94,.07);box-shadow:0 0 24px rgba(244,63,94,.25);}
.ci.done{opacity:.38;}
.ci.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);animation:breathe 1.6s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:1;box-shadow:0 0 8px var(--red);}50%{opacity:.2;box-shadow:none;}}
.ci-time{font-family:'Share Tech Mono',monospace;font-size:15px;color:#fff;white-space:nowrap;font-weight:600;}
.ci-name{font-size:22px;font-weight:900;}
.ci-subj{font-size:14px;color:#fff;margin-top:3px;font-weight:500;}
.ci-badge{font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;white-space:nowrap;letter-spacing:.5px;}
.b-up{background:rgba(126,168,201,.1);color:var(--text2);}
.b-on{background:rgba(244,63,94,.2);color:var(--red);animation:blink 1.6s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.b-dn{background:rgba(16,185,129,.1);color:var(--green);}
.name-mh{color:var(--mh);text-shadow:0 0 12px rgba(0,242,254,.5);}
.name-gy{color:var(--gy);text-shadow:0 0 12px rgba(255,215,0,.4);}
.name-jy{color:var(--jy);text-shadow:0 0 12px rgba(255,133,173,.4);}

/* ── LOADING DOTS ── */
.dots::after{content:'';animation:dotdot 1.4s infinite;}
@keyframes dotdot{0%{content:'';}25%{content:'.';}50%{content:'..';}75%{content:'...';}100%{content:'';}}
.loading-txt{color:var(--text3);font-size:13px;text-align:center;padding:12px 0;}

/* ── FOOTER ── */
footer{text-align:center;margin-top:14px;font-size:11px;letter-spacing:2px;color:var(--text3);border-top:1px solid var(--border);padding-top:14px;}
footer span{color:var(--accent);}

@media(max-width:600px){
  .top-row{grid-template-columns:1fr;}
  .ci{grid-template-columns:1fr;gap:8px;}
  .ci-badge{width:fit-content;}
  .next-badge{display:none;}
  .stock-row{display:grid;grid-template-columns:1fr 1fr;}
  .indicator-row{flex-direction:column;}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- 時鐘 + 天氣 -->
  <div class="top-row">
    <div class="card clock-card">
      <div class="clock-time" id="clock">--:--:--</div>
      <div class="clock-date" id="cdate"></div>
      <div class="clock-wd"   id="cwd"></div>
    </div>
    <div class="card weather-card">
      <div class="card-label">水林鄉即時天氣</div>
      <div id="weather-wrap"><div class="loading-txt">🛰️ 水林天氣載入中<span class="dots"></span></div></div>
    </div>
  </div>

  <!-- 連假橫幅 -->
  <div class="h-banner" id="hbanner">
    <div class="h-ico">🎉</div>
    <div>
      <div class="h-name" id="hname"></div>
      <div class="h-warn">🏖️ 連假愉快！請確認補習班是否停課</div>
    </div>
  </div>

  <!-- 台股報價 -->
  <div class="card stock-card">
    <div class="card-label" id="stock-label">台股報價</div>
    <div id="stock-wrap"><div class="loading-txt">📈 股價載入中<span class="dots"></span></div></div>
  </div>

  <!-- 費半指數 -->
  <div class="card">
    <div class="card-label">費城半導體指數（SOX）</div>
    <div id="sox-wrap"><div class="loading-txt">📡 SOX 載入中<span class="dots"></span></div></div>
  </div>

  <!-- 景氣燈號 + VIX 獨立卡片 -->
  <div class="card">
    <div class="card-label">市場溫度計</div>
    <div id="indicator-wrap">
      <div class="indicator-row">
        <div class="ind-card">
          <div class="ind-light" style="background:#10b981;box-shadow:0 0 10px #10b981"></div>
          <div><div class="ind-title">景氣信號燈　2025.03</div>
          <div class="ind-val" style="color:#10b981">綠燈</div>
          <div class="ind-sub">景氣穩定</div></div>
        </div>
        <div class="ind-card" id="vix-card">
          <div class="ind-light" style="background:var(--text3)"></div>
          <div><div class="ind-title">VIX 恐慌指數</div>
          <div class="ind-val" id="vix-val">載入中</div>
          <div class="ind-sub" id="vix-sub">請稍候</div></div>
          <div class="ind-sub">載入中</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 三大法人 -->
  <div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <div class="card-label" style="margin-bottom:0">三大法人買賣超排行</div>
      <span class="fi-date" id="fi-date"></span>
    </div>
    <div class="fi-tabs">
      <button class="fi-tab active"  onclick="switchFI('foreign','buy',this)">🏦 外資買超</button>
      <button class="fi-tab"         onclick="switchFI('foreign','sell',this)">🏦 外資賣超</button>
      <button class="fi-tab"         onclick="switchFI('trust','buy',this)">🏛️ 投信買超</button>
      <button class="fi-tab"         onclick="switchFI('trust','sell',this)">🏛️ 投信賣超</button>
      <button class="fi-tab"         onclick="switchFI('dealer','buy',this)">🏢 自營買超</button>
      <button class="fi-tab"         onclick="switchFI('dealer','sell',this)">🏢 自營賣超</button>
    </div>
    <div id="fi-wrap"><div class="loading-txt">📊 三大法人載入中<span class="dots"></span></div></div>
  </div>

  <!-- 下一堂課預告 -->
  <div class="card next-card">
    <div class="card-label">下一堂課程預告</div>
    <div class="next-inner" id="next-inner"><div style="color:var(--text3)">計算中…</div></div>
  </div>

  <!-- 今日課表 -->
  <div class="card">
    <div class="sec-title">今日課表</div>
    <div id="sched"></div>
  </div>

  <footer>自動更新中 ｜ 距下次刷新：<span id="rcd">60</span> 秒</footer>
</div>

<script>
'use strict';

/* ══════════ HELPERS ══════════ */
const pad = n => String(n).padStart(2,'0');
const hm  = (h,m) => h*60+m;
const WD  = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

async function fetchT(url, ms=6000){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), ms);
  try {
    const r = await fetch(url, {signal:ctrl.signal});
    clearTimeout(timer);
    return r;
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

/* ══════════ CLOCK ══════════ */
function tickClock(){
  const n = new Date();
  document.getElementById('clock').textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  document.getElementById('cdate').textContent = `民國 ${n.getFullYear()-1911} 年 ${n.getMonth()+1} 月 ${n.getDate()} 日`;
  document.getElementById('cwd').textContent   = WD[n.getDay()];
}
setInterval(tickClock, 1000);
tickClock();

/* ══════════ WEATHER ══════════ */
const WMO = {
  0:['☀️','晴天'],1:['🌤️','大致晴朗'],2:['⛅','部分多雲'],3:['☁️','陰天'],
  45:['🌫️','有霧'],48:['🌫️','凍霧'],
  51:['🌦️','輕毛毛雨'],53:['🌦️','毛毛雨'],55:['🌧️','大毛毛雨'],
  61:['🌧️','小雨'],63:['🌧️','中雨'],65:['🌧️','大雨'],
  80:['🌦️','陣雨'],81:['🌧️','中陣雨'],82:['⛈️','強陣雨'],
  95:['⛈️','雷雨'],96:['⛈️','冰雹雷雨'],99:['⛈️','強冰雹雷雨'],
};
function wmoGet(c){
  if(WMO[c]) return WMO[c];
  let best=null, bd=999;
  for(const k of Object.keys(WMO)){ const d=Math.abs(+k-c); if(d<bd){bd=d;best=WMO[k];} }
  return best||['🌡️','未知'];
}
async function loadWeather(){
  try {
    const r = await fetchT('https://api.open-meteo.com/v1/forecast?latitude=23.57&longitude=120.24&current=temperature_2m,weathercode,relative_humidity_2m&timezone=Asia%2FTaipei');
    const d = await r.json();
    const temp = Math.round(d.current.temperature_2m);
    const hum  = d.current.relative_humidity_2m;
    const [ico,desc] = wmoGet(d.current.weathercode);
    document.getElementById('weather-wrap').innerHTML = `
      <div class="w-main">
        <div class="w-icon">${ico}</div>
        <div>
          <div class="w-temp">${temp}<sup>°C</sup></div>
          <div class="w-desc">${desc}</div>
          <div class="w-sub">相對濕度 ${hum}%</div>
        </div>
      </div>`;
  } catch {
    document.getElementById('weather-wrap').innerHTML = `<div class="loading-txt">🛰️ 水林天氣更新中...</div>`;
    setTimeout(loadWeather, 30000);
  }
}
loadWeather();
setInterval(loadWeather, 10*60*1000);

/* ══════════ HOLIDAYS ══════════ */
const H2026 = [
  {n:'元旦',              r:['2026-01-01','2026-01-01']},
  {n:'農曆春節連假',      r:['2026-02-14','2026-02-22']},
  {n:'和平紀念日',        r:['2026-03-02','2026-03-02']},
  {n:'清明節連假',        r:['2026-04-03','2026-04-06']},
  {n:'勞動節',            r:['2026-05-01','2026-05-01']},
  {n:'端午節連假',        r:['2026-06-19','2026-06-21']},
  {n:'中秋節／教師節連假',r:['2026-09-25','2026-09-28']},
  {n:'國慶日連假',        r:['2026-10-09','2026-10-11']},
];
function updateHoliday(){
  const n  = new Date();
  const ds = `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;
  const h  = H2026.find(x => ds>=x.r[0] && ds<=x.r[1]);
  const el = document.getElementById('hbanner');
  if(h){ document.getElementById('hname').textContent=`🎌 ${h.n}`; el.classList.add('show'); }
  else  { el.classList.remove('show'); }
}

/* ══════════ SCHEDULE ══════════ */
function fridaySpeaking(){
  const t = new Date(); const today = new Date(t.getFullYear(),t.getMonth(),t.getDate());
  return today >= new Date(2026,5,12)
    ? {label:'19:30–19:55',sh:19,sm:30,eh:19,em:55}
    : {label:'19:00–19:25',sh:19,sm:0, eh:19,em:25};
}

function getDay(dow){
  switch(dow){
    case 1: return [
      {label:'16:30–18:00',sh:16,sm:30,eh:18,em:0, name:'旻桓',subj:'英文'},
      {label:'18:30–20:00',sh:18,sm:30,eh:20,em:0, name:'冠宇',subj:'英文'},
    ];
    case 2: return [
      {label:'16:30–18:30',sh:16,sm:30,eh:18,em:30,name:'旻桓',subj:'數學'},
      {label:'19:00–20:00',sh:19,sm:0, eh:20,em:0, name:'冠宇',subj:'鋼琴'},
    ];
    case 3: return [
      {label:'13:30–15:30',sh:13,sm:30,eh:15,em:30,name:'冠宇',subj:'數學'},
      {label:'16:30–18:00',sh:16,sm:30,eh:18,em:0, name:'旻桓',subj:'英文'},
      {label:'18:30–20:00',sh:18,sm:30,eh:20,em:0, name:'冠宇',subj:'英文'},
    ];
    case 4: {
      const t=new Date(), today=new Date(t.getFullYear(),t.getMonth(),t.getDate());
      if(today>=new Date(2026,4,21) && today<=new Date(2026,5,25))
        return [{label:'18:00–18:25',sh:18,sm:0,eh:18,em:25,name:'旻桓',subj:'口說英語（25分鐘）'}];
      return [];
    }
    case 5: {
      const sp = fridaySpeaking();
      return [
        {label:'16:30–18:30',sh:16,sm:30,eh:18,em:30,name:'旻桓',subj:'數學'},
        {label:'17:30–18:30',sh:17,sm:30,eh:18,em:30,name:'婕檥',subj:'瑜伽'},
        {label:sp.label,sh:sp.sh,sm:sp.sm,eh:sp.eh,em:sp.em,name:'冠宇',subj:'口說英文（25分鐘）'},
      ];
    }
    case 6: return [
      {label:'10:00–12:00',sh:10,sm:0,eh:12,em:0,name:'冠宇',subj:'數學'},
    ];
    default: return [];
  }
}

function courseStatus(c){
  const n=new Date(), cur=hm(n.getHours(),n.getMinutes());
  const s=hm(c.sh,c.sm), e=hm(c.eh,c.em);
  if(cur<s)  return 'upcoming';
  if(cur<=e) return 'active';
  return 'done';
}

function nameClass(n){
  if(n==='旻桓') return 'name-mh';
  if(n==='冠宇') return 'name-gy';
  if(n==='婕檥') return 'name-jy';
  return '';
}

const BADGE = {
  upcoming:['b-up','尚未開始'],
  active:  ['b-on','🔴 上課中'],
  done:    ['b-dn','已結束'],
};

function renderSched(){
  const dow  = new Date().getDay();
  const list = getDay(dow);
  const el   = document.getElementById('sched');
  if(!list.length){
    el.innerHTML = `<div class="no-cls"><em>🏠</em>${WD[dow]}　今日無補習課程，好好休息！</div>`;
    return;
  }
  let html = '<div class="clist">';
  for(const c of list){
    const st = courseStatus(c);
    const [cls,lbl] = BADGE[st];
    const nc = nameClass(c.name);
    html += `<div class="ci ${st}">
      <div class="ci-time">${c.label}</div>
      <div><div class="ci-name ${nc}">${c.name}</div><div class="ci-subj">${c.subj}</div></div>
      <div class="ci-badge ${cls}">${lbl}</div>
    </div>`;
  }
  el.innerHTML = html + '</div>';
}

/* ══════════ NEXT CLASS ══════════ */
function fmtCD(mins){
  if(mins<=0) return '即將開始';
  const h=Math.floor(mins/60), m=mins%60;
  return h>0 ? `還有 ${h} 小時 ${m} 分鐘` : `還有 ${m} 分鐘`;
}

function renderNext(){
  const now=new Date(), cur=hm(now.getHours(),now.getMinutes());
  let found=null;
  for(let off=0; off<7; off++){
    const d=new Date(now); d.setDate(now.getDate()+off);
    const list=getDay(d.getDay());
    for(const c of list){
      const s=hm(c.sh,c.sm);
      if(off===0 && s<=cur) continue;
      const diff = off===0 ? (s-cur) : (24*60-cur+(off-1)*24*60+s);
      found={c,diff,off,dow:d.getDay()};
      break;
    }
    if(found) break;
  }
  const el=document.getElementById('next-inner');
  if(!found){ el.innerHTML=`<div style="color:var(--text3)">近期無課程</div>`; return; }
  const when = found.off===0?'今天':found.off===1?'明天':WD[found.dow];
  const nc   = nameClass(found.c.name);
  el.innerHTML = `
    <div class="next-dot"></div>
    <div class="next-body">
      <div class="next-lbl">下一堂課程預告</div>
      <div class="next-who"><span class="${nc}">${found.c.name}</span> <span style="color:#fff;font-weight:500">${found.c.subj}</span></div>
      <div class="next-cd">${when} ${found.c.label} ── ${fmtCD(found.diff)}</div>
    </div>
    <div class="next-badge">${fmtCD(found.diff)}</div>`;
}

/* ══════════ STOCKS ══════════ */
function isMarketOpen(){
  const n=new Date(), dow=n.getDay();
  if(dow===0||dow===6) return false;
  const t=n.getHours()*100+n.getMinutes();
  return t>=900 && t<=1330;
}

function stockHtml(sym,name,price,chgVal,chgPct,tag,isIdx){
  if(!price||isNaN(price)||price<=0) return `<div class="stock-item"><div class="stock-sym">${sym}</div><div class="stock-name">${name}</div><div class="stock-price">--</div><div class="stock-chg flat">更新中</div></div>`;
  const cls   = chgVal>0?'up':chgVal<0?'dn':'flat';
  const arrow = chgVal>0?'▲':chgVal<0?'▼':'—';
  const pStr  = isIdx ? Math.round(price).toLocaleString() : price.toFixed(2);
  const cStr  = isNaN(chgPct)?'--':(Math.abs(chgPct).toFixed(2)+'%');
  return `<div class="stock-item">
    <div class="stock-sym">${sym}</div><div class="stock-name">${name}</div>
    <div class="stock-price">${pStr}</div>
    <div class="stock-chg ${cls}">${arrow} ${cStr}</div>
    <div class="stock-tag">${tag}</div>
  </div>`;
}

/* ── Yahoo Finance via allorigins（統一來源，最穩定）── */
async function fetchYahoo(ticker){
  const url   = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=5d`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const ctrl  = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 12000);
  try {
    const r     = await fetch(proxy, {signal:ctrl.signal});
    clearTimeout(timer);
    const outer = await r.json();
    const data  = JSON.parse(outer.contents);
    const meta  = data.chart.result[0].meta;
    const price = meta.regularMarketPrice || 0;
    const prev  = meta.chartPreviousClose || meta.previousClose || 0;
    const chg   = price - prev;
    const pct   = prev>0 ? chg/prev*100 : 0;
    return {price, prev, chgVal:chg, chgPct:pct};
  } catch {
    clearTimeout(timer);
    return null;
  }
}

/* ── VIX：多代理輪詢，直到成功 ── */
const VIX_PROXIES = [
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];
const VIX_URL = 'https://stooq.com/q/l/?s=%5Evix&f=sd2t2ohlcv&h&e=json';

async function fetchVIXFinnhub(){
  for(const makeProxy of VIX_PROXIES){
    try {
      const ctrl  = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), 8000);
      const r     = await fetch(makeProxy(VIX_URL), {signal:ctrl.signal});
      clearTimeout(timer);
      // allorigins 回傳 {contents:...}，其他直接回傳 JSON
      const text  = await r.text();
      let d;
      try { const wrap=JSON.parse(text); d=wrap.contents?JSON.parse(wrap.contents):wrap; }
      catch { continue; }
      if(!d.symbols||!d.symbols[0]||!d.symbols[0].close) continue;
      const s     = d.symbols[0];
      const price = parseFloat(s.close)||0;
      const prev  = parseFloat(s.open)||0;
      if(price<=0) continue;
      return {price, chgVal:price-prev, chgPct:prev>0?(price-prev)/prev*100:0};
    } catch { continue; }
  }
  return null;
}

function vixLevel(v){
  if(v<15) return {label:'極度樂觀',  color:'#10b981'};
  if(v<20) return {label:'市場平靜',  color:'#38bdf8'};
  if(v<25) return {label:'輕微恐慌',  color:'#fbbf24'};
  if(v<30) return {label:'明顯恐慌',  color:'#fb923c'};
  return          {label:'極度恐慌',  color:'#f43f5e'};
}

const TICKERS = [
  {sym:'%5ETWII',  display:'加權指數', name:'台灣加權',  isIdx:true},
  {sym:'0050.TW',  display:'0050',     name:'元大台灣50',isIdx:false},
  {sym:'00631L.TW',display:'00631L',   name:'台灣50正2', isIdx:false},
  {sym:'2330.TW',  display:'2330',     name:'台積電',    isIdx:false},

function isMarketOpen(){
  const n=new Date(), dow=n.getDay();

  const t=n.getHours()*100+n.getMinutes();

let stockRetryTimer=null;
async function loadStocks(){
  const isOpen = isMarketOpen();
  document.getElementById('stock-label').textContent = isOpen?'台股即時報價':'台股收盤價格';
  const tag = isOpen?'即時':'收盤';

  const results = await Promise.all(TICKERS.map(t=>fetchYahoo(t.sym)));
  const anyData = results.some(r=>r&&r.price>0);

  if(!anyData){
    document.getElementById('stock-wrap').innerHTML=
      `<div class="loading-txt">⏳ 股價連線中，10秒後重試<span class="dots"></span></div>`;
    if(stockRetryTimer) clearTimeout(stockRetryTimer);
    stockRetryTimer=setTimeout(loadStocks,10000);
    return;
  }

  let html='<div class="stock-row">';
  for(let i=0;i<TICKERS.length;i++){
    const t=TICKERS[i], q=results[i];
    html+=q?stockHtml(t.display,t.name,q.price,q.chgVal,q.chgPct,tag,t.isIdx)
           :stockHtml(t.display,t.name,0,0,0,tag,t.isIdx);
  }
  html+='</div>';
  document.getElementById('stock-wrap').innerHTML=html;

  // VIX 獨立更新（用多代理輪詢）
  try{
    const vd = await fetchVIXFinnhub();
    if(vd&&vd.price>0){
      const vi = vixLevel(vd.price);
      document.getElementById('vix-card').querySelector('.ind-light').style.cssText=`background:${vi.color};box-shadow:0 0 10px ${vi.color}`;
      document.getElementById('vix-val').textContent = vd.price.toFixed(2);
      document.getElementById('vix-val').style.color = vi.color;
      document.getElementById('vix-sub').textContent = vi.label;
      document.getElementById('vix-sub').style.color = vi.color;
    } else {
      document.getElementById('vix-val').textContent = '--';
      document.getElementById('vix-sub').textContent = '數據暫不可用';
    }
  }catch{
    document.getElementById('vix-val').textContent = '--';
    document.getElementById('vix-sub').textContent = '數據暫不可用';
  }
}
loadStocks();
setInterval(loadStocks,3*60*1000);

/* ══════════ THREE INSTITUTIONS ══════════ */
const allFI  = {foreign:{buy:[],sell:[]},trust:{buy:[],sell:[]},dealer:{buy:[],sell:[]}};
let fiInst = 'foreign', fiDir = 'buy';

function switchFI(inst, dir, btn){
  fiInst=inst; fiDir=dir;
  document.querySelectorAll('.fi-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderFI();
}

function renderFI(){
  const list = allFI[fiInst][fiDir];
  if(!list||!list.length){
    document.getElementById('fi-wrap').innerHTML=`<div class="loading-txt">暫無資料</div>`;
    return;
  }
  const isBuy = fiDir==='buy';
  let html = `<table class="fi-table"><thead><tr>
    <th>股票</th><th>股名</th><th>${isBuy?'買超(張)':'賣超(張)'}</th><th>收盤價</th>
  </tr></thead><tbody>`;
  list.forEach((r,i)=>{
    const rankCls = i===0?'r1':i===1?'r2':i===2?'r3':'';
    const valCls  = isBuy?'fi-buy':'fi-sell';
    html += `<tr>
      <td><span class="fi-rank ${rankCls}">${i+1}</span>${r.code}</td>
      <td style="color:var(--text2);font-size:13px">${r.name}</td>
      <td class="${valCls}">${Math.abs(r.net).toLocaleString()}</td>
      <td style="color:#fff">${r.close}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('fi-wrap').innerHTML = html;
}

function parseInst(rows, col){
  const parsed = rows.map(row=>({
    code:  row[0].trim(),
    name:  row[1].trim(),
    net:   parseInt((row[col]||'0').replace(/,/g,'').replace(/\+/g,''))||0,
    close: row[row.length-1]||'--',
  }));
  return {
    buy:  [...parsed].filter(r=>r.net>0).sort((a,b)=>b.net-a.net).slice(0,10),
    sell: [...parsed].filter(r=>r.net<0).sort((a,b)=>a.net-b.net).slice(0,10),
  };
}

async function loadFI(){
  try {
    const today = new Date();
    const ymd   = `${today.getFullYear()}${pad(today.getMonth()+1)}${pad(today.getDate())}`;
    const r     = await fetchT(`https://www.twse.com.tw/fund/T86?response=json&date=${ymd}&selectType=ALLBUT0999`, 8000);
    const d     = await r.json();
    if(!d.data||!d.data.length){
      document.getElementById('fi-wrap').innerHTML=`<div class="loading-txt">今日尚無三大法人資料（休市或資料未更新）</div>`;
      return;
    }
    allFI.foreign = parseInst(d.data, 4);
    allFI.trust   = parseInst(d.data, 7);
    allFI.dealer  = parseInst(d.data, 10);
    const ds = d.date||ymd;
    document.getElementById('fi-date').textContent = `(${ds.substring(0,4)}/${ds.substring(4,6)}/${ds.substring(6,8)})`;
    renderFI();
  } catch {
    document.getElementById('fi-wrap').innerHTML=`<div class="loading-txt">⏳ 三大法人連線中，稍後重試<span class="dots"></span></div>`;
    setTimeout(loadFI, 10000);
  }
}
loadFI();
setInterval(loadFI, 15*60*1000);
